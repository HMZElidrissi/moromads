name = "moromads"
main = "./workers/app.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./build/client" }

[vars]
ADMIN_KEY = "change-me-in-production"

[[d1_databases]]
binding = "DB"
database_name = "moromads"
database_id = "placeholder"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "moromads-images"
